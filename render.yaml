# TEMPORAL: Render deploy — eliminar después de pruebas
services:
  - type: web
    name: sorteo-app
    env: node
    buildCommand: npm run build:render
    startCommand: node dist-server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: MP_CLIENT_ID
        sync: false
      - key: MP_CLIENT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: APP_URL
        sync: false
